{{- if and .Values.clickhouse.external.enabled .Values.clickhouse.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "portkey.fullname" . }}-clickhouse-migration
  labels:
    {{- include "portkey.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ include "portkey.fullname" . }}-clickhouse-migration
  annotations:
    {{- include "portkey.annotations" . | nindent 4 }}
    "helm.sh/hook": post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.clickhouse.migration.backoffLimit | default 3 }}
  activeDeadlineSeconds: {{ .Values.clickhouse.migration.activeDeadlineSeconds | default 7200 }}
  template:
    metadata:
      labels:
        {{- include "portkey.labels" . | nindent 8 }}
        app.kubernetes.io/component: {{ include "portkey.fullname" . }}-clickhouse-migration
    spec:
      imagePullSecrets:
      {{- range .Values.imageCredentials }}
      - name: {{ .name }}
      {{- end }}
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.images.clickhouseImage.repository }}:{{ .Values.images.clickhouseImage.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.images.clickhouseImage.pullPolicy }}
          {{- with .Values.clickhouse.migration.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: OLD_CH_HOST
              value: {{ include "portkey.fullname" . }}-{{ .Values.clickhouse.name }}
            - name: OLD_CH_PORT
              value: {{ .Values.clickhouse.containerNativePort | quote }}
            {{- if .Values.clickhouse.migration.oldCredentials.existingSecretName }}
            - name: OLD_CH_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.clickhouse.migration.oldCredentials.existingSecretName }}
                  key: clickhouse_user
            - name: OLD_CH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.clickhouse.migration.oldCredentials.existingSecretName }}
                  key: clickhouse_password
            {{- else }}
            - name: OLD_CH_USER
              value: {{ .Values.clickhouse.migration.oldCredentials.user | default .Values.clickhouse.external.user | quote }}
            - name: OLD_CH_PASSWORD
              value: {{ .Values.clickhouse.migration.oldCredentials.password | default .Values.clickhouse.external.password | quote }}
            {{- end }}
            {{- if .Values.clickhouse.external.existingSecretName }}
            - name: NEW_CH_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.clickhouse.external.existingSecretName }}
                  key: clickhouse_host
            - name: NEW_CH_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.clickhouse.external.existingSecretName }}
                  key: clickhouse_native_port
            - name: NEW_CH_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.clickhouse.external.existingSecretName }}
                  key: clickhouse_user
            - name: NEW_CH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.clickhouse.external.existingSecretName }}
                  key: clickhouse_password
            - name: CH_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.clickhouse.external.existingSecretName }}
                  key: clickhouse_db
            {{- else }}
            - name: NEW_CH_HOST
              value: {{ .Values.clickhouse.external.host | quote }}
            - name: NEW_CH_PORT
              value: {{ .Values.clickhouse.external.nativePort | quote }}
            - name: NEW_CH_USER
              value: {{ .Values.clickhouse.external.user | quote }}
            - name: NEW_CH_PASSWORD
              value: {{ .Values.clickhouse.external.password | quote }}
            - name: CH_DATABASE
              value: {{ .Values.clickhouse.external.database | quote }}
            {{- end }}
            - name: MAX_BLOCK_SIZE
              value: {{ .Values.clickhouse.migration.maxBlockSize | default 65536 | quote }}
          command:
            - /bin/bash
            - -ce
            - |
              TABLES=(generations feedbacks generation_hooks audit_logs)

              echo "=== ClickHouse Migration ==="
              echo "Old CH: ${OLD_CH_HOST}:${OLD_CH_PORT} (user: ${OLD_CH_USER})"
              echo "New CH: ${NEW_CH_HOST}:${NEW_CH_PORT} (user: ${NEW_CH_USER})"
              echo "Database: ${CH_DATABASE}"
              echo "Tables: ${TABLES[*]}"
              echo ""

              echo "--- Waiting for old ClickHouse to be reachable ---"
              until clickhouse-client --host "${OLD_CH_HOST}" --port "${OLD_CH_PORT}" \
                --user "${OLD_CH_USER}" --password "${OLD_CH_PASSWORD}" \
                --query "SELECT 1" >/dev/null 2>&1; do
                echo "Old CH not ready, retrying in 5s..."
                sleep 5
              done
              echo "Old CH is reachable."

              echo "--- Waiting for new ClickHouse to be reachable ---"
              until clickhouse-client --host "${NEW_CH_HOST}" --port "${NEW_CH_PORT}" \
                --user "${NEW_CH_USER}" --password "${NEW_CH_PASSWORD}" \
                --query "SELECT 1" >/dev/null 2>&1; do
                echo "New CH not ready, retrying in 5s..."
                sleep 5
              done
              echo "New CH is reachable."

              echo "--- Waiting for tables to exist on new ClickHouse ---"
              for table in "${TABLES[@]}"; do
                until clickhouse-client --host "${NEW_CH_HOST}" --port "${NEW_CH_PORT}" \
                  --user "${NEW_CH_USER}" --password "${NEW_CH_PASSWORD}" \
                  --query "SELECT 1 FROM ${CH_DATABASE}.${table} LIMIT 0" >/dev/null 2>&1; do
                  echo "Table ${CH_DATABASE}.${table} not yet created on new CH, retrying in 10s..."
                  sleep 10
                done
                echo "Table ${CH_DATABASE}.${table} exists on new CH."
              done
              echo ""

              FAILED=0
              for table in "${TABLES[@]}"; do
                echo "=== Migrating ${CH_DATABASE}.${table} ==="

                OLD_COUNT=$(clickhouse-client --host "${OLD_CH_HOST}" --port "${OLD_CH_PORT}" \
                  --user "${OLD_CH_USER}" --password "${OLD_CH_PASSWORD}" \
                  --query "SELECT count() FROM ${CH_DATABASE}.${table}")
                echo "Rows in old CH: ${OLD_COUNT}"

                if [ "${OLD_COUNT}" -eq 0 ]; then
                  echo "No data to migrate, skipping."
                  echo ""
                  continue
                fi

                echo "Truncating ${CH_DATABASE}.${table} on new CH (idempotent retry)..."
                clickhouse-client --host "${NEW_CH_HOST}" --port "${NEW_CH_PORT}" \
                  --user "${NEW_CH_USER}" --password "${NEW_CH_PASSWORD}" \
                  --query "TRUNCATE TABLE ${CH_DATABASE}.${table}"

                echo "Copying data..."
                clickhouse-client --host "${OLD_CH_HOST}" --port "${OLD_CH_PORT}" \
                  --user "${OLD_CH_USER}" --password "${OLD_CH_PASSWORD}" \
                  --max_block_size=${MAX_BLOCK_SIZE} --max_insert_block_size=${MAX_BLOCK_SIZE} \
                  --query "SELECT * FROM ${CH_DATABASE}.${table} FORMAT Native" \
                | clickhouse-client --host "${NEW_CH_HOST}" --port "${NEW_CH_PORT}" \
                  --user "${NEW_CH_USER}" --password "${NEW_CH_PASSWORD}" \
                  --max_insert_block_size=${MAX_BLOCK_SIZE} \
                  --query "INSERT INTO ${CH_DATABASE}.${table} FORMAT Native"

                NEW_COUNT=$(clickhouse-client --host "${NEW_CH_HOST}" --port "${NEW_CH_PORT}" \
                  --user "${NEW_CH_USER}" --password "${NEW_CH_PASSWORD}" \
                  --query "SELECT count() FROM ${CH_DATABASE}.${table}")

                if [ "${NEW_COUNT}" -ge "${OLD_COUNT}" ]; then
                  echo "Verification passed: old=${OLD_COUNT} new=${NEW_COUNT}"
                else
                  echo "WARNING: Row count mismatch: old=${OLD_COUNT} new=${NEW_COUNT}"
                  FAILED=1
                fi
                echo ""
              done

              if [ "${FAILED}" -eq 1 ]; then
                echo "=== Migration completed with warnings ==="
                exit 1
              fi

              echo "=== Migration completed successfully ==="
{{- end }}
