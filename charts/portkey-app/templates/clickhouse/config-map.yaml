{{- if not .Values.clickhouse.external.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "portkey.fullname" . }}-{{ .Values.clickhouse.name }}
  labels:
    {{- include "portkey.labels" . | nindent 4 }}
  annotations:
    {{- include "portkey.annotations" . | nindent 4 }}
data:
  config.xml: |
    <clickhouse>
      <path>/var/lib/clickhouse/</path>
      <tmp_path>/var/lib/clickhouse/tmp/</tmp_path>
      <user_files_path>/var/lib/clickhouse/user_files/</user_files_path>
      <format_schema_path>/var/lib/clickhouse/format_schemas/</format_schema_path>
      <access_control_path>/var/lib/clickhouse/access/</access_control_path>
      {{- if .Values.clickhouse.https.enabled }}
      <https_port>{{ .Values.clickhouse.https.port }}</https_port>
      <openSSL>
        <server>
          <certificateFile>{{ .Values.clickhouse.https.certs.crt }}</certificateFile>
          <privateKeyFile>{{ .Values.clickhouse.https.certs.key }}</privateKeyFile>
          {{- if .Values.clickhouse.https.certs.ca }}
          <caConfig>{{ .Values.clickhouse.https.certs.ca }}</caConfig>
          {{- end }}
          <verificationMode>{{ .Values.clickhouse.https.certs.verificationMode }}</verificationMode>
        </server>
      </openSSL>
      {{- end }}
      {{- if .Values.clickhouse.retention.enabled }}
      <merge_tree>
        <merge_with_ttl_timeout>{{ .Values.clickhouse.retention.mergeWithTtlTimeout }}</merge_with_ttl_timeout>
        <ttl_only_drop_parts>{{ .Values.clickhouse.retention.ttlOnlyDropParts }}</ttl_only_drop_parts>
      </merge_tree>
      {{- end }}
      {{- if include "clickhouse.replicationEnabled" . }}
      <interserver_http_port>{{ .Values.clickhouse.containerInterserverPort }}</interserver_http_port>
      <remote_servers>
        <{{ .Values.clickhouse.clusterName }}>
          <shard>
            <internal_replication>true</internal_replication>
            {{- $replicas := int .Values.clickhouse.statefulSet.replicas }}
            {{- $headlessSvc := include "clickhouse.headlessServiceName" . }}
            {{- $nativePort := .Values.clickhouse.containerNativePort }}
            {{- $fullname := include "portkey.fullname" . }}
            {{- $chName := .Values.clickhouse.name }}
            {{- range $i := until $replicas }}
            <replica>
              <host>{{ $fullname }}-{{ $chName }}-{{ $i }}.{{ $headlessSvc }}</host>
              <port>{{ $nativePort }}</port>
            </replica>
            {{- end }}
          </shard>
        </{{ .Values.clickhouse.clusterName }}>
      </remote_servers>
      <zookeeper>
        {{- if .Values.clickhouseKeeper.external.enabled }}
        {{- range .Values.clickhouseKeeper.external.hosts }}
        <node>
          <host>{{ .host }}</host>
          <port>{{ .port }}</port>
        </node>
        {{- end }}
        {{- else }}
        {{- $keeperReplicas := int .Values.clickhouseKeeper.replicas }}
        {{- $keeperHeadlessSvc := include "clickhouseKeeper.headlessServiceName" . }}
        {{- $keeperFullname := include "portkey.fullname" . }}
        {{- $keeperName := .Values.clickhouseKeeper.name }}
        {{- $keeperPort := .Values.clickhouseKeeper.containerPort }}
        {{- range $i := until $keeperReplicas }}
        <node>
          <host>{{ $keeperFullname }}-{{ $keeperName }}-{{ $i }}.{{ $keeperHeadlessSvc }}</host>
          <port>{{ $keeperPort }}</port>
        </node>
        {{- end }}
        {{- end }}
      </zookeeper>
      {{- end }}
    </clickhouse>
  {{- if not .Values.clickhouse.external.existingSecretName }}
  users.xml: |
    <clickhouse>
      <users>
        <{{ .Values.clickhouse.external.user }}>
          <access_management>1</access_management>
          <named_collection_control>1</named_collection_control>
          <show_named_collections>1</show_named_collections>
          <show_named_collections_secrets>1</show_named_collections_secrets>
          <profile>default</profile>
        </{{ .Values.clickhouse.external.user }}>
      </users>
      <profiles>
        <default>
          <async_insert>1</async_insert>
          <async_insert_max_data_size>2000000</async_insert_max_data_size>
          <wait_for_async_insert>0</wait_for_async_insert>
          <parallel_view_processing>1</parallel_view_processing>
          <materialize_ttl_after_modify>0</materialize_ttl_after_modify>
          <wait_for_async_insert_timeout>25</wait_for_async_insert_timeout>
        </default>
      </profiles>
    </clickhouse>
  {{- end }}
{{- end }}