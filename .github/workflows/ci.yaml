name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'charts/**'

jobs:
  lint-and-template:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.0

      - name: Lint charts
        run: |
          for chart in charts/*/; do
            echo "=== Linting ${chart} ==="
            helm lint "${chart}"
          done

      - name: Template charts
        run: |
          for chart in charts/*/; do
            echo "=== Templating ${chart} ==="
            helm template test "${chart}"
          done
